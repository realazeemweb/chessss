    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chess Game</title>

<style>
    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#222;
        font-family:Arial;
    }

    .board{
        display:grid;
        grid-template-columns: repeat(8, 80px);
        grid-template-rows: repeat(8, 80px);
        border:5px solid #333;
    }

    .square{
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:45px;
        cursor:pointer;
    }

    .light{
        background:#f0d9b5;
    }

    .dark{
        background:#b58863;
    }

    .square:hover{
        background: #9ccc65;
    }
</style>
</head>

<body>

<div class="board">

    <div class="square dark">♜</div>
    <div class="square light">♞</div>
    <div class="square dark">♝</div>
    <div class="square light">♛</div>
    <div class="square dark">♚</div>
    <div class="square light">♝</div>
    <div class="square dark">♞</div>
    <div class="square light">♜</div>


    <div class="square light">♟</div>
    <div class="square dark">♟</div>
    <div class="square light">♟</div>
    <div class="square dark">♟</div>
    <div class="square light">♟</div>
    <div class="square dark">♟</div>
    <div class="square light">♟</div>
    <div class="square dark">♟</div>

    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>

    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>

    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>

    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>
    <div class="square light"></div>
    <div class="square dark"></div>

    <div class="square dark">♙</div>
    <div class="square light">♙</div>
    <div class="square dark">♙</div>
    <div class="square light">♙</div>
    <div class="square dark">♙</div>
    <div class="square light">♙</div>
    <div class="square dark">♙</div>

    <div class="square light">♖</div>

    <div class="square light">♔</div>
    <div class="square dark">♗</div>
    <div class="square light">♘</div>
    <div class="square dark">♖</div>

</div>

</body>
</html>
</body>
</html>
